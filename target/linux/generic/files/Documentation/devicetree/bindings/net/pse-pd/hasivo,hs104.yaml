%YAML 1.2
---
$id: http://devicetree.org/schemas/net/pse-pd/hasivo,hs104.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hasivo HS104 Power Sourcing Equipment controller

maintainers:
  - Bevan Weiss <bevan.weiss@gmail.com>

allOf:
  - $ref: pse-controller.yaml#

properties:
  compatible:
    enum:
      - hasivo,hs104

  reg:
    maxItems: 1

  hasivo,port-enable-delay-ms:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Delay in milliseconds after enabling a port before proceeding.
    minimum: 0
    maximum: 65535

unevaluatedProperties: false

required:
  - compatible
  - reg

examples:
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;

      ethernet-pse@20 {
        compatible = "hasivo,hs104";
        reg = <0x20>;
        hasivo,port-enable-delay-ms = <300>;
      };
    };